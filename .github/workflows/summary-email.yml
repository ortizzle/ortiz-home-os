name: Wednesday meeting summary

# Emails Chris the Family-meeting summary on Wednesday morning, once Claudia's
# agenda for the week has been drafted in the app (it syncs to the Gist). If no
# agenda is there yet, it sends a short nudge instead.
# 14:00 UTC = 7:00 AM America/Phoenix (Arizona has no DST — stable year-round).
# Day-of-week 3 = Wednesday, matching the app's default Family meeting day.
on:
  schedule:
    - cron: '0 14 * * 3'
  workflow_dispatch: {} # run by hand from the Actions tab to test

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install nodemailer@6 --no-save
      - run: node .github/scripts/send-summary.mjs
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }} # optional; defaults to chris.ortiz@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          KAT_EMAIL: ${{ secrets.KAT_EMAIL }} # so Kat gets the agenda too (unless SUMMARY_TO overrides)
          SUMMARY_TO: ${{ secrets.SUMMARY_TO }} # optional; comma-separated list takes full control of recipients
